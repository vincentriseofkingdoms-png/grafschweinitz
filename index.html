<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GV Webdesign</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#000;color:#fff}

header{position:fixed;width:100%;padding:20px 50px;display:flex;justify-content:space-between;background:rgba(0,0,0,0.6);backdrop-filter:blur(20px);z-index:1000}

.section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px 40px}

.hero h1{font-size:5rem}
.hero p{margin-top:20px;opacity:.6}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:40px;width:100%;max-width:1200px;margin-top:60px}

.card{background:#111;border-radius:20px;overflow:hidden;cursor:pointer;transition:.3s}
.card:hover{transform:scale(1.05)}
.card img{width:100%}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;justify-content:center;align-items:center;z-index:2000}

.modal-content{background:#fff;color:#000;width:90%;height:90%;overflow:auto;border-radius:20px}

.close{position:absolute;top:20px;right:40px;font-size:30px;cursor:pointer;color:white}

.demo{font-family:Arial;padding:30px}
.demo h1{font-size:2rem;margin-bottom:20px}
.demo .box{height:200px;background:#ddd;border-radius:10px;margin-bottom:20px}

footer{padding:60px;text-align:center;opacity:.5}
</style>
</head>

<body>
<header>
<div>GV Webdesign</div>
</header>

<section class="section hero">
<h1>Websites die verkaufen.</h1>
<p>Showcases echter Kundenprojekte.</p>
</section>

<section class="section">
<h2 style="font-size:3rem">Showcase</h2>
<div class="grid">

<div class="card" onclick="openDemo('friseur')">
<img src="https://picsum.photos/600/400?hair">
</div>

<div class="card" onclick="openDemo('gym')">
<img src="https://picsum.photos/600/400?gym">
</div>

<div class="card" onclick="openDemo('restaurant')">
<img src="https://picsum.photos/600/400?restaurant">
</div>

</div>
</section>

<footer>© 2026 GV Webdesign</footer>

<div class="modal" id="modal">
<div class="close" onclick="closeDemo()">×</div>
<div class="modal-content" id="demoContent"></div>
</div>

<script>
const lenis=new Lenis();
function raf(time){lenis.raf(time);requestAnimationFrame(raf)}
requestAnimationFrame(raf);

function openDemo(type){
const modal=document.getElementById('modal');
const content=document.getElementById('demoContent');

if(type==='friseur'){
content.innerHTML=`
<div class="demo">
<h1>Friseur Salon</h1>
<div class="box"></div>
<p>Hero Bereich mit Terminbuchung</p>
<div class="box"></div>
<p>Preisliste & Services</p>
<div class="box"></div>
<p>Kundenbewertungen</p>
</div>`;
}

if(type==='gym'){
content.innerHTML=`
<div class="demo">
<h1>Fitness Studio</h1>
<div class="box"></div>
<p>Motivierender Hero mit CTA</p>
<div class="box"></div>
<p>Mitgliedschaften</p>
<div class="box"></div>
<p>Trainer Vorstellung</p>
</div>`;
}

if(type==='restaurant'){
content.innerHTML=`
<div class="demo">
<h1>Restaurant</h1>
<div class="box"></div>
<p>Hero mit Essen Bildern</p>
<div class="box"></div>
<p>Speisekarte</p>
<div class="box"></div>
<p>Reservierung</p>
</div>`;
}

modal.style.display='flex';
}

function closeDemo(){
document.getElementById('modal').style.display='none';
}

</script>

</body>
</html>
