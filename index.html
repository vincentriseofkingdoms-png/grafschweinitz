<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GV Webdesign — Premium Agency</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#000;color:#fff;overflow-x:hidden}
canvas{position:fixed;top:0;left:0;z-index:-1}

header{position:fixed;width:100%;padding:20px 50px;display:flex;justify-content:space-between;background:rgba(0,0,0,0.6);backdrop-filter:blur(20px);z-index:1000}
header a{color:#aaa;margin-left:25px;text-decoration:none}
header a:hover{color:#fff}

.section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:100px 40px}

.hero h1{font-size:6rem}
.hero p{margin-top:20px;opacity:.6}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:40px;width:100%;max-width:1200px;margin-top:60px}

.card{background:#111;border-radius:20px;overflow:hidden;cursor:pointer;transition:.3s}
.card:hover{transform:scale(1.05)}
.card img{width:100%}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.97);display:none;justify-content:center;align-items:center;z-index:2000}
.modal-content{background:#fff;color:#000;width:95%;height:95%;overflow:auto;border-radius:20px;padding:40px}
.close{position:absolute;top:20px;right:40px;font-size:30px;cursor:pointer}

.demo-section{margin-bottom:60px}
.demo-hero{height:300px;background:#ddd;border-radius:20px;margin-bottom:20px}
.demo-box{height:150px;background:#eee;border-radius:15px;margin-bottom:15px}

.light{background:#fff;color:#000}

footer{padding:80px;text-align:center;opacity:.5}
</style>
</head>

<body>
<header>
<div>GV Webdesign</div>
<div>
<a>Showcase</a>
<a>Leistungen</a>
<a>Kontakt</a>
</div>
</header>

<section class="section hero">
<h1>Premium Webseiten</h1>
<p>Design. Performance. Conversion.</p>
</section>

<section class="section">
<h2 style="font-size:3rem">Showcase</h2>
<div class="grid">
<div class="card" onclick="openDemo('friseur')"><img src="https://picsum.photos/600/400?1"></div>
<div class="card" onclick="openDemo('gym')"><img src="https://picsum.photos/600/400?2"></div>
<div class="card" onclick="openDemo('restaurant')"><img src="https://picsum.photos/600/400?3"></div>
<div class="card" onclick="openDemo('business')"><img src="https://picsum.photos/600/400?4"></div>
</div>
</section>

<section class="section light">
<h2 style="font-size:3rem">Leistungen</h2>
<div class="grid">
<div>Webdesign</div>
<div>SEO</div>
<div>Performance</div>
<div>Conversion</div>
</div>
</section>

<footer>© 2026 GV Webdesign</footer>

<div class="modal" id="modal">
<div class="close" onclick="closeDemo()">×</div>
<div class="modal-content" id="demoContent"></div>
</div>

<script>

// Smooth Scroll
const lenis=new Lenis();
function raf(time){lenis.raf(time);requestAnimationFrame(raf)}
requestAnimationFrame(raf);

// 3D Background
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const geo=new THREE.TorusKnotGeometry(10,3,100,16);
const mat=new THREE.MeshStandardMaterial({color:0xffffff,wireframe:true});
const mesh=new THREE.Mesh(geo,mat);
scene.add(mesh);

const light=new THREE.PointLight(0xffffff,1);
light.position.set(50,50,50);
scene.add(light);

camera.position.z=30;

function animate(){
requestAnimationFrame(animate);
mesh.rotation.x+=0.003;
mesh.rotation.y+=0.005;
renderer.render(scene,camera);
}
animate();

// Demo Loader
function openDemo(type){
const modal=document.getElementById('modal');
const content=document.getElementById('demoContent');

let html="";

if(type==='friseur'){
html=`
<div class='demo-section'>
<h1>Friseur Salon</h1>
<div class='demo-hero'></div>
<div class='demo-box'></div>
<div class='demo-box'></div>
<div class='demo-box'></div>
</div>`;
}

if(type==='gym'){
html=`
<div class='demo-section'>
<h1>Fitness Studio</h1>
<div class='demo-hero'></div>
<div class='demo-box'></div>
<div class='demo-box'></div>
<div class='demo-box'></div>
</div>`;
}

if(type==='restaurant'){
html=`
<div class='demo-section'>
<h1>Restaurant</h1>
<div class='demo-hero'></div>
<div class='demo-box'></div>
<div class='demo-box'></div>
<div class='demo-box'></div>
</div>`;
}

if(type==='business'){
html=`
<div class='demo-section'>
<h1>Business Website</h1>
<div class='demo-hero'></div>
<div class='demo-box'></div>
<div class='demo-box'></div>
<div class='demo-box'></div>
</div>`;
}

content.innerHTML=html;
modal.style.display='flex';
}

function closeDemo(){
document.getElementById('modal').style.display='none';}

// Animations

gsap.registerPlugin(ScrollTrigger);

gsap.utils.toArray('.card').forEach(el=>{
  gsap.from(el,{opacity:0,y:100,scrollTrigger:{trigger:el,start:'top 85%'}});
});

</script>

</body>
</html>
