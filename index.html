<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

header{
  position:fixed;
  width:100%;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index:1000;
}

header a{
  color:white;
  margin-left:20px;
  text-decoration:none;
  opacity:0.7;
}

.section{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;
}

.hero h1{
  font-size:5rem;
}

.hero p{
  margin-top:20px;
  opacity:0.6;
}

.big-text{
  font-size:4rem;
  max-width:900px;
}

.image{
  width:80%;
  border-radius:20px;
  margin-top:40px;
}

.btn{
  margin-top:30px;
  padding:15px 30px;
  border-radius:50px;
  background:white;
  color:black;
  border:none;
  cursor:pointer;
}

.parallax{
  position:relative;
  overflow:hidden;
}

.parallax img{
  width:120%;
  position:absolute;
  top:0;
  left:-10%;
}

.cursor{
  width:20px;
  height:20px;
  border:2px solid white;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  transition:0.1s;
}

footer{
  padding:50px;
  text-align:center;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="cursor"></div>

<header>
<div>STUDIO</div>
<div>
<a href="#">Work</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>
</header>

<section class="section hero">
<h1>Digital Experience</h1>
<p>Wie Apple. Nur für dein Business.</p>
<button class="btn">Start</button>
</section>

<section class="section">
<h2 class="big-text">Wir bauen Websites die sich anders anfühlen.</h2>
<img class="image" src="https://picsum.photos/1200/700">
</section>

<section class="section parallax">
<img src="https://picsum.photos/1200/800" id="parallaxImg">
<h2 class="big-text">Smooth. Schnell. Premium.</h2>
</section>

<section class="section">
<h2 class="big-text">Mehr Kunden. Weniger Bla Bla.</h2>
<button class="btn">Projekt starten</button>
</section>

<footer>
<p>© 2026 Studio Pro</p>
</footer>

<script>

// GSAP Animations

gsap.registerPlugin(ScrollTrigger);

// Fade in sections

gsap.utils.toArray(".section").forEach(section => {
  gsap.from(section, {
    opacity:0,
    y:100,
    duration:1,
    scrollTrigger:{
      trigger:section,
      start:"top 80%"
    }
  });
});

// Parallax

gsap.to("#parallaxImg", {
  y:200,
  scrollTrigger:{
    trigger:"#parallaxImg",
    scrub:true
  }
});

// Cursor

const cursor = document.querySelector('.cursor');

document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// Button hover effect

const buttons = document.querySelectorAll('.btn');

buttons.forEach(btn => {
  btn.addEventListener('mouseenter', () => {
    cursor.style.transform = 'scale(2)';
  });
  btn.addEventListener('mouseleave', () => {
    cursor.style.transform = 'scale(1)';
  });
});

</script>

</body>
</html>
