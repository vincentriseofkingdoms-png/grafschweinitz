<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Agency</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#000;color:#fff;overflow-x:hidden}
canvas{position:fixed;top:0;left:0;z-index:-1}

header{
position:fixed;
width:100%;
padding:20px 40px;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
z-index:1000}

.section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px}

.hero h1{font-size:5rem}
.big{font-size:4rem;max-width:900px}
.btn{margin-top:30px;padding:15px 30px;border-radius:50px;border:none;background:white;color:black;cursor:pointer}
</style>
</head>

<body>

<header>
<div>3D STUDIO</div>
<div>
<a>Work</a>
<a>About</a>
<a>Contact</a>
</div>
</header>

<section class="section hero">
<h1>3D Web Experiences</h1>
<p>Next Level Design</p>
<button class="btn">Start</button>
</section>

<section class="section">
<h2 class="big">Interaktive 3D Webseiten</h2>
</section>

<section class="section">
<h2 class="big">Scroll. Move. Feel.</h2>
</section>

<section class="section">
<h2 class="big">Mehr Kunden durch Experience</h2>
<button class="btn">Kontakt</button>
</section>

<script>
// LENIS
const lenis=new Lenis();
function raf(time){lenis.raf(time);requestAnimationFrame(raf)}
requestAnimationFrame(raf);

// THREE JS
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const geometry=new THREE.TorusKnotGeometry(10,3,100,16);
const material=new THREE.MeshStandardMaterial({color:0xffffff,wireframe:true});
const knot=new THREE.Mesh(geometry,material);
scene.add(knot);

const light=new THREE.PointLight(0xffffff,1);
light.position.set(50,50,50);
scene.add(light);

camera.position.z=30;

function animate(){
requestAnimationFrame(animate);
knot.rotation.x+=0.005;
knot.rotation.y+=0.01;
renderer.render(scene,camera);
}
animate();

// scroll animation

gsap.to(knot.rotation,{
  x:3,
  scrollTrigger:{scrub:true}
});

</script>

</body>
</html>
