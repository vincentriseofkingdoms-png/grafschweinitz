<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GV Webdesign</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#000;color:#fff}

/* NAV */
header{
position:fixed;width:100%;padding:20px 50px;
display:flex;justify-content:space-between;
background:rgba(0,0,0,0.6);backdrop-filter:blur(20px);
z-index:1000;
}

/* SECTIONS */
.section{
min-height:100vh;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
text-align:center;padding:80px 40px;
}

/* HERO */
.hero h1{font-size:5rem}
.hero p{margin-top:20px;opacity:.6}

/* SHOWCASE */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:40px;
width:100%;
max-width:1200px;
margin-top:60px;
}

.card{
background:#111;
border-radius:20px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{transform:scale(1.05)}

.card img{width:100%}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:#111;
padding:20px;
border-radius:20px;
width:80%;
height:80%;
overflow:auto;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:30px;
cursor:pointer;
}

/* DEMO DESIGN */
.demo{
padding:40px;
}

.demo h1{
font-size:2rem;
margin-bottom:20px;
}

.demo-box{
height:200px;
background:#222;
border-radius:10px;
margin-bottom:20px;
}

/* LIGHT SECTION */
.light{background:#fff;color:#000}

/* FOOTER */
footer{padding:60px;text-align:center;opacity:.5}
</style>
</head>

<body>

<header>
<div>GV Webdesign</div>
</header>

<!-- HERO -->
<section class="section hero">
<h1>Websites die verkaufen.</h1>
<p>Modernes Design. Klare Ergebnisse.</p>
</section>

<!-- SHOWCASE -->
<section class="section">
<h2 style="font-size:3rem">Showcase</h2>

<div class="grid">

<div class="card" onclick="openDemo('business')">
<img src="https://picsum.photos/600/400?1">
</div>

<div class="card" onclick="openDemo('portfolio')">
<img src="https://picsum.photos/600/400?2">
</div>

<div class="card" onclick="openDemo('landing')">
<img src="https://picsum.photos/600/400?3">
</div>

</div>
</section>

<!-- SERVICES -->
<section class="section light">
<h2 style="font-size:3rem">Leistungen</h2>

<div class="grid">
<div>Webdesign</div>
<div>SEO</div>
<div>Performance</div>
<div>Conversion</div>
</div>
</section>

<footer>
<p>© 2026 GV Webdesign</p>
</footer>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="close" onclick="closeDemo()">×</div>
<div class="modal-content" id="demoContent"></div>
</div>

<script>

// LENIS
const lenis=new Lenis();
function raf(time){lenis.raf(time);requestAnimationFrame(raf)}
requestAnimationFrame(raf);

// DEMO CONTENT
function openDemo(type){
const modal=document.getElementById('modal');
const content=document.getElementById('demoContent');

if(type==='business'){
content.innerHTML=`
<div class="demo">
<h1>Business Website</h1>
<div class="demo-box"></div>
<p>Professionelle Firmenwebsite mit klarer Struktur.</p>
</div>`;
}

if(type==='portfolio'){
content.innerHTML=`
<div class="demo">
<h1>Portfolio</h1>
<div class="demo-box"></div>
<p>Minimalistische Showcase Seite für Kreative.</p>
</div>`;
}

if(type==='landing'){
content.innerHTML=`
<div class="demo">
<h1>Landingpage</h1>
<div class="demo-box"></div>
<p>Optimiert für Conversion und Leads.</p>
</div>`;
}

modal.style.display='flex';
}

function closeDemo(){
document.getElementById('modal').style.display='none';
}

// ANIMATION
gsap.utils.toArray('.card').forEach(el=>{
gsap.from(el,{
opacity:0,
y:100,
duration:1,
scrollTrigger:{trigger:el,start:'top 85%'}
});
});

</script>

</body>
</html>
