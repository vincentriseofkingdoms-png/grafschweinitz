<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Next Level Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background:#020617;
      color:white;
      overflow-x:hidden;
    }

    /* Animated background */
    .bg {
      position:fixed;
      width:100%; height:100%;
      background: radial-gradient(circle at 20% 20%, #1e3a8a, transparent),
                  radial-gradient(circle at 80% 80%, #7c3aed, transparent);
      filter: blur(100px);
      z-index:-1;
      animation: moveBg 15s infinite alternate;
    }

    @keyframes moveBg {
      0% { transform: translate(0,0); }
      100% { transform: translate(-50px, -50px); }
    }

    header {
      padding:2rem;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header h1 {
      font-weight:800;
      font-size:1.5rem;
      background:linear-gradient(90deg,#38bdf8,#a78bfa);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    nav a {
      margin-left:1.5rem;
      text-decoration:none;
      color:#94a3b8;
      transition:0.3s;
    }

    nav a:hover { color:white; }

    .hero {
      height:90vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .hero h2 {
      font-size:3rem;
      font-weight:800;
      background:linear-gradient(90deg,#38bdf8,#a78bfa);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation: fadeUp 1s ease forwards;
    }

    .hero p {
      margin-top:1rem;
      color:#94a3b8;
      animation: fadeUp 1.5s ease forwards;
    }

    button {
      margin-top:2rem;
      padding:1rem 2rem;
      border:none;
      border-radius:999px;
      background:linear-gradient(90deg,#38bdf8,#a78bfa);
      color:white;
      cursor:pointer;
      transition:0.3s;
      animation: fadeUp 2s ease forwards;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow:0 0 25px #38bdf8;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(30px); }
      to { opacity:1; transform:translateY(0); }
    }

    .projects {
      padding:4rem 2rem;
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
      gap:2rem;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius:1.5rem;
      padding:2rem;
      backdrop-filter: blur(20px);
      transition:0.4s;
      transform: perspective(1000px) rotateX(0) rotateY(0);
    }

    .card:hover {
      transform: perspective(1000px) rotateX(5deg) rotateY(10deg) scale(1.05);
      box-shadow:0 20px 50px rgba(0,0,0,0.5);
    }

    .card h3 { margin-bottom:0.5rem; }
    .card p { color:#94a3b8; }

    footer {
      text-align:center;
      padding:2rem;
      color:#64748b;
    }

  </style>
</head>
<body>

<div class="bg"></div>

<header>
  <h1>DEV</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#projects">Projects</a>
  </nav>
</header>

<section class="hero">
  <h2>Next Level Developer</h2>
  <p>Ultra moderne GitHub Website mit Animationen ⚡</p>
  <button onclick="scrollToProjects()">Projekte ansehen</button>
</section>

<section id="projects" class="projects">
  <div class="card">
    <h3>Projekt 1</h3>
    <p>Beschreibung</p>
  </div>
  <div class="card">
    <h3>Projekt 2</h3>
    <p>Beschreibung</p>
  </div>
  <div class="card">
    <h3>Projekt 3</h3>
    <p>Beschreibung</p>
  </div>
</section>

<footer>
  © 2026 Next Level Portfolio
</footer>

<script>
  function scrollToProjects(){
    document.getElementById('projects').scrollIntoView({behavior:'smooth'});
  }

  // Mouse move parallax
  document.addEventListener('mousemove', e => {
    const x = (window.innerWidth/2 - e.clientX)/50;
    const y = (window.innerHeight/2 - e.clientY)/50;
    document.querySelector('.bg').style.transform = `translate(${x}px, ${y}px)`;
  });
</script>

</body>
</html>
